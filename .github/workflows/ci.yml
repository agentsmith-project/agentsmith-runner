name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quick-governance:
    name: Quick governance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Verify bootstrap governance
        run: bash scripts/verify-release.sh --quick

  contract-consumer-start-guard:
    name: Runner start guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Verify runner startup guard
        run: bash scripts/verify-release.sh --start-guard
